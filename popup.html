<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xHunter</title>
  <link rel="stylesheet" href="styles/popup.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <svg class="logo-mark" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <!-- crosshair: hunt the right match -->
          <circle cx="12" cy="12" r="7.5" stroke="#635bff" stroke-width="2" />
          <path d="M12 1.5V5M12 19v3.5M1.5 12H5M19 12h3.5" stroke="#635bff" stroke-width="2" stroke-linecap="round" />
          <circle cx="12" cy="12" r="2.1" fill="#635bff" />
        </svg>
        <span class="brand-name">xHunter</span>
      </div>
      <button id="gearBtn" class="icon-btn" title="API key settings" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.6"/>
          <path d="M19.4 13a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.83a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1Z" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </button>
    </header>
    <div class="divider"></div>

    <!-- API key settings (toggled by gear) -->
    <section id="settingsPanel" class="settings hidden">
      <label class="field-label" for="apiKeyInput">DeepSeek API key</label>
      <div class="settings-row">
        <input id="apiKeyInput" class="text-input" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false" />
        <button id="saveKeyBtn" class="ghost-btn small">Save</button>
      </div>
      <p id="keySaved" class="saved-note hidden">API key saved ✓</p>
    </section>

    <!-- CV input -->
    <section class="cv-section">
      <div class="tabs" role="tablist">
        <button id="tabPaste" class="tab active" role="tab" aria-selected="true">Paste</button>
        <button id="tabUpload" class="tab" role="tab" aria-selected="false">Upload</button>
      </div>

      <!-- Paste panel -->
      <div id="pastePanel" class="panel">
        <textarea id="cvTextarea" class="cv-textarea" placeholder="Paste your CV here..." spellcheck="false"></textarea>
      </div>

      <!-- Upload panel -->
      <div id="uploadPanel" class="panel hidden">
        <div id="dropzone" class="dropzone" tabindex="0">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 16V4m0 0L7 9m5-5 5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <p class="dropzone-text">Drop your PDF or DOCX here<br /><span class="dropzone-sub">or click to browse</span></p>
          <input id="fileInput" type="file" accept=".pdf,.docx" hidden />
        </div>
        <div id="filePreview" class="file-preview hidden">
          <div class="file-preview-head">
            <span id="fileName" class="file-name"></span>
            <span id="fileChars" class="file-chars"></span>
          </div>
          <p id="filePreviewText" class="file-preview-text"></p>
        </div>
      </div>

      <div class="save-row">
        <button id="saveCvBtn" class="ghost-btn">Save CV</button>
        <span id="cvSaved" class="saved-chip hidden">CV Saved <span class="check">✓</span></span>
      </div>
    </section>

    <!-- Analyze -->
    <button id="analyzeBtn" class="analyze-btn">
      <span class="btn-label">Analyze Match →</span>
      <span class="dots" aria-hidden="true"><i></i><i></i><i></i></span>
    </button>

    <!-- Inline error -->
    <div id="errorBox" class="error-box hidden"></div>

    <!-- Match report -->
    <section id="reportCard" class="report-card hidden">
      <div class="gauge-wrap">
        <svg class="gauge" width="96" height="96" viewBox="0 0 120 120">
          <circle class="gauge-track" cx="60" cy="60" r="52" />
          <circle id="gaugeArc" class="gauge-arc" cx="60" cy="60" r="52" />
        </svg>
        <div class="gauge-center">
          <span id="scoreNumber" class="score-number">0</span>
        </div>
      </div>
      <p class="gauge-label">Match Score</p>
      <div id="rescoreBadge" class="rescore-badge hidden"></div>
      <p id="reportSummary" class="report-summary"></p>

      <div class="columns">
        <div class="column">
          <h3 class="col-head strengths-head">Strengths</h3>
          <div id="strengthsList" class="chip-list"></div>
        </div>
        <div class="column">
          <h3 class="col-head gaps-head">Gaps</h3>
          <div id="gapsList" class="chip-list"></div>
        </div>
      </div>

      <div id="keywordsBlock" class="keywords-block hidden">
        <p class="keywords-label">Add these keywords →</p>
        <div id="keywordsList" class="chip-list keywords"></div>
      </div>
    </section>

    <!-- Sticky action footer: next-step actions stay visible regardless of scroll -->
    <div id="actionFooter" class="action-footer hidden">
      <!-- Tailor -->
      <button id="tailorBtn" class="tailor-btn hidden">
        <span class="btn-label">Tailor My CV →</span>
      </button>

      <!-- Download -->
      <button id="downloadBtn" class="download-btn hidden">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M14 3v4a1 1 0 0 0 1 1h4" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 21V5a2 2 0 0 1 2-2h7l5 5v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M12 11v6m0 0-2.5-2.5M12 17l2.5-2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Download Tailored CV</span>
      </button>

      <!-- Cover letter -->
      <button id="coverBtn" class="tailor-btn cover-btn hidden">
        <span class="btn-label">Write Cover Letter →</span>
      </button>

      <!-- Download cover letter -->
      <button id="coverDownloadBtn" class="download-btn hidden">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M14 3v4a1 1 0 0 0 1 1h4" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 21V5a2 2 0 0 1 2-2h7l5 5v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M12 11v6m0 0-2.5-2.5M12 17l2.5-2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Download Cover Letter</span>
      </button>

      <!-- Reset: clear match + job data, keep saved CV and API key -->
      <button id="resetBtn" class="reset-btn" type="button">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M20 11a8 8 0 1 0-.6 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M20 4v5h-5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>New job — clear results</span>
      </button>
    </div>
  </div>

  <!-- Bundled libraries (load before popup.js) -->
  <script src="libs/pdf.min.js"></script>
  <script src="libs/mammoth.browser.min.js"></script>
  <script src="libs/jspdf.umd.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
